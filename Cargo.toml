[package]
name = "hark"
version = "0.1.0"
edition = "2021"

[dependencies]
base64 = "0.22.1"
base64-serde = "0.7.0"
chrono = { version = "0.4.38", features = ["serde"] }
imap-proto = "0.16.5"
itertools = "0.13.0"
mail-parser = "0.9.3"
serde = { version = "1.0.204", features = ["derive"] }
thiserror = "1.0.63"
tokio = { version = "1.39.1", features = ["full"] }

[dependencies.async-imap]
version = "0.9.7"
default-features = false
features = ["runtime-tokio"]

[dependencies.async-native-tls]
version = "0.5.0"
default-features = false
features = ["runtime-tokio"]

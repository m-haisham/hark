<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/dist/output.css" />
        <script src="//unpkg.com/alpinejs" defer></script>
        <script defer>
            window.addEventListener('alpine:init', () => {
              {% include "./main.js" %}
            })
        </script>
        <title>Hark</title>
    </head>

    <body class="h-full flex flex-col text-sm bg-default" x-data>
        <!-- Header -->
        <header
            class="flex items-center justify-between px-4 h-11 shrink-0 border-b border-subtle"
        >
            <span class="font-semibold">Hark</span>
            <span
                class="text-xs text-faint"
                x-text="$store.app.connections.length + ' connection' + ($store.app.connections.length === 1 ? '' : 's')"
            ></span>
        </header>

        <!-- 3-pane layout -->
        <div
            class="flex flex-1 overflow-hidden divide-x divide-gray-200/70 dark:divide-gray-700/50"
        >
            <!-- Pane 1: Connections -->
            <div class="w-72 flex flex-col shrink-0 overflow-hidden">
                <div
                    class="px-3 py-2 text-xs font-semibold text-faint border-b shrink-0"
                >
                    Connections
                </div>
                <div class="flex-1 overflow-y-auto">
                    <template x-if="$store.app.connections.length === 0">
                        <p class="p-6 text-center text-xs text-faint">
                            No connections
                        </p>
                    </template>
                    <template
                        x-for="conn in $store.app.connections"
                        :key="conn.id"
                    >
                        <div
                            class="px-3 py-2.5 cursor-pointer border-b border-subtle hover:bg-indigo-50 dark:hover:bg-gray-800"
                            :class="$store.app.activeConnectionId === conn.id ? 'item-active' : ''"
                            @click="$store.app.selectConnection(conn.id)"
                        >
                            <span
                                class="font-semibold truncate block"
                                x-text="conn.id"
                            ></span>
                            <span
                                class="flex items-center gap-1 text-xs text-faint mt-0.5"
                            >
                                <span
                                    class="inline-block w-1.5 h-1.5 rounded-full shrink-0"
                                    :class="{
                                        'bg-green-500': $store.app.stateLabel(conn.state) === 'running',
                                        'bg-amber-400': ['starting','stopping'].includes($store.app.stateLabel(conn.state)),
                                        'bg-red-500':   $store.app.stateLabel(conn.state) === 'failed',
                                        'bg-gray-400':  ['stopped','unknown'].includes($store.app.stateLabel(conn.state)),
                                    }"
                                ></span>
                                <span
                                    x-text="$store.app.stateLabel(conn.state)"
                                ></span>
                                <span class="opacity-40">·</span>
                                <span
                                    class="truncate"
                                    x-text="conn.connection.host"
                                ></span>
                            </span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Pane 2: Message list -->
            <div class="w-72 flex flex-col shrink-0 overflow-hidden">
                <div
                    class="px-3 py-2 text-xs font-semibold text-faint border-b border-subtle shrink-0"
                    x-text="$store.app.activeConnectionId || 'Messages'"
                ></div>
                <div class="flex-1 overflow-y-auto">
                    <template x-if="!$store.app.activeConnectionId">
                        <p class="p-6 text-center text-xs text-faint">
                            Select a connection
                        </p>
                    </template>
                    <template
                        x-if="$store.app.activeConnectionId && $store.app.activeMessages.length === 0"
                    >
                        <p class="p-6 text-center text-xs text-faint">
                            No messages
                        </p>
                    </template>
                    <template
                        x-for="msg in $store.app.activeMessages"
                        :key="msg.id"
                    >
                        <div
                            class="px-3 py-2.5 cursor-pointer border-b border-subtle hover:bg-indigo-50 dark:hover:bg-gray-800"
                            :class="$store.app.activeMessage?.id === msg.id ? 'item-active' : ''"
                            @click="$store.app.selectMessage(msg)"
                        >
                            <div
                                class="font-semibold truncate"
                                x-text="$store.app.formatAddress(msg.envelope.from)"
                            ></div>
                            <div
                                class="text-xs truncate mt-0.5"
                                x-text="msg.subject || '(no subject)'"
                            ></div>
                            <div
                                class="text-xs mt-0.5 opacity-50"
                                x-text="$store.app.formatDate(msg.envelope.date)"
                            ></div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Pane 3: Message viewer -->
            <div class="flex flex-col flex-1 overflow-hidden">
                <div
                    class="px-3 py-2 text-xs font-semibold text-faint border-b shrink-0"
                >
                    Message
                </div>
                <div class="flex-1 overflow-y-auto">
                    <template x-if="!$store.app.activeMessage">
                        <div
                            class="h-full flex items-center justify-center text-xs text-faint"
                        >
                            Select a message to read
                        </div>
                    </template>
                    <template x-if="$store.app.activeMessage">
                        <div class="p-6">
                            <div class="pb-4 mb-4 border-b border-subtle">
                                <h2
                                    class="text-base font-bold mb-2"
                                    x-text="$store.app.activeMessage.subject || '(no subject)'"
                                ></h2>
                                <dl class="text-xs font-muted space-y-0.5">
                                    <div class="flex gap-1">
                                        <dt class="font-semibold w-10 shrink-0">
                                            From
                                        </dt>
                                        <dd
                                            x-text="$store.app.formatAddress($store.app.activeMessage.envelope.from)"
                                        ></dd>
                                    </div>
                                    <div class="flex gap-1">
                                        <dt class="font-semibold w-10 shrink-0">
                                            To
                                        </dt>
                                        <dd
                                            x-text="$store.app.formatAddress($store.app.activeMessage.envelope.to)"
                                        ></dd>
                                    </div>
                                    <div class="flex gap-1">
                                        <dt class="font-semibold w-10 shrink-0">
                                            Date
                                        </dt>
                                        <dd
                                            x-text="$store.app.formatDate($store.app.activeMessage.envelope.date)"
                                        ></dd>
                                    </div>
                                </dl>
                            </div>
                            <p
                                class="text-sm leading-relaxed whitespace-pre-wrap text-muted"
                                x-text="$store.app.activeMessage.body_text[0] || '(empty)'"
                            ></p>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer
            class="flex items-center justify-between px-4 h-7 bg-default text-xs text-faint shrink-0 border-t"
        >
            <span>Hark — IMAP client</span>
            <span x-text="new Date().getFullYear()"></span>
        </footer>
    </body>
</html>
